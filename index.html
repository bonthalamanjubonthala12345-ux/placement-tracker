<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="dashboard">
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Placement Tracker</h1>
        <p class="muted">Signed in as <strong id="currentUser">-</strong></p>
      </div>
      <div class="topbar-actions">
        <button id="themeBtn" type="button" class="btn btn-secondary">Theme</button>
        <button id="logoutBtn" type="button" class="btn btn-danger">Logout</button>
      </div>
    </header>

    <section class="stats-grid">
      <article class="stat-card">
        <p>Total</p>
        <h3 id="statTotal">0</h3>
      </article>
      <article class="stat-card">
        <p>Solved</p>
        <h3 id="statSolved">0</h3>
      </article>
      <article class="stat-card">
        <p>Attempted</p>
        <h3 id="statAttempted">0</h3>
      </article>
      <article class="stat-card">
        <p>Hard</p>
        <h3 id="statHard">0</h3>
      </article>
    </section>

    <section class="card">
      <h2>Add Problem</h2>
      <form id="problemForm" class="grid-form">
        <label>
          Problem Name
          <input id="problemName" type="text" placeholder="e.g. Two Sum" required>
        </label>
        <label>
          Topic
          <select id="topic" required>
            <option value="Arrays">Arrays</option>
            <option value="Strings">Strings</option>
            <option value="Linked List">Linked List</option>
            <option value="Dynamic Programming">Dynamic Programming</option>
            <option value="Graphs">Graphs</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label id="customTopicWrap" style="display:none;">
          Custom Topic
          <input id="customTopic" type="text" placeholder="e.g. Backtracking">
        </label>
        <label>
          Difficulty
          <select id="difficulty" required>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </label>
        <label>
          Status
          <select id="status" required>
            <option value="Solved">Solved</option>
            <option value="Attempted">Attempted</option>
            <option value="Revision">Revision</option>
          </select>
        </label>
        <label>
          Platform
          <input id="platform" type="text" placeholder="e.g. LeetCode">
        </label>
        <button type="submit" class="btn">Add Problem</button>
      </form>
    </section>

    <section class="card">
      <h2>Filters & Actions</h2>
      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Search problem name">
        <select id="filterDifficulty">
          <option value="All">All Difficulty</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <select id="filterStatus">
          <option value="All">All Status</option>
          <option value="Solved">Solved</option>
          <option value="Attempted">Attempted</option>
          <option value="Revision">Revision</option>
        </select>
        <button id="exportBtn" type="button" class="btn btn-secondary">Export CSV</button>
        <button id="clearAllBtn" type="button" class="btn btn-danger">Clear All</button>
      </div>
    </section>

    <section class="card">
      <h2>Problem List</h2>
      <table>
        <thead>
          <tr>
            <th>Problem</th>
            <th>Topic</th>
            <th>Difficulty</th>
            <th>Status</th>
            <th>Platform</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="problemTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Analytics</h2>
      <div class="progress-wrap">
        <div class="progress-header">
          <span>Solved Progress</span>
          <strong id="progressLabel">0%</strong>
        </div>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>
      <div class="analytics-grid">
        <div class="chart-card">
          <h3>Difficulty Split</h3>
          <canvas id="difficultyChart" aria-label="Difficulty chart"></canvas>
        </div>
        <div class="chart-card">
          <h3>Topic Coverage</h3>
          <canvas id="topicChart" aria-label="Topic chart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
